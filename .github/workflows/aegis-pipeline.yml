name: Aegis CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'GMAO-Project-main/**'
      - '.github/workflows/aegis-pipeline.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase for Docker registry compatibility
  IMAGE_NAME_FRONTEND: youssefag1337/gmao-frontend
  IMAGE_NAME_BACKEND: youssefag1337/gmao-backend

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./GMAO-Project-main/gmao-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./GMAO-Project-main/gmao-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes Manifests
        run: |
          # Use sed to update the image tags in the deployments
          sed -i "s|image: ghcr.io/youssefag1337/gmao-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}|g" kubernetes/apps/gmao/frontend-deployment.yaml
          sed -i "s|image: ghcr.io/youssefag1337/gmao-backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}|g" kubernetes/apps/gmao/backend-deployment.yaml
          
          # Configure Git and Commit
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add kubernetes/apps/gmao/frontend-deployment.yaml kubernetes/apps/gmao/backend-deployment.yaml
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi
