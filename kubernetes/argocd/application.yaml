apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-root-app
  namespace: argocd
spec:
  project: aegis-project
  source:
    repoURL: 'https://github.com/YoussefAG1337/aegis.git'
    targetRevision: HEAD
    path: kubernetes/apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
