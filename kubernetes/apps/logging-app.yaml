apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-stack
  namespace: argocd
spec:
  project: aegis-project
  source:
    chart: loki-stack
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.10.1
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: true
            size: 5Gi
        promtail:
          enabled: true
        grafana:
          enabled: false  # We are already deploying Grafana with the prometheus stack
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
